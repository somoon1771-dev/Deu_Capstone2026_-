spring.application.name=capstone-server

spring.datasource.url=jdbc:mysql://localhost:3306/busan_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

capstone.routing.osm.enabled=true
capstone.routing.osm.pbf-path=data/osm/gyeongsang-non-military.osm.pbf
capstone.routing.osm.max-bbox-span=0.04

capstone.routing.tmap.enabled=true
capstone.routing.tmap.parallelism=4
capstone.routing.tmap.fallback-when-osm-insufficient=true
capstone.routing.tmap.min-osm-candidates=3
capstone.routing.tmap.max-additional-candidates=4
capstone.routing.tmap.request-timeout-seconds=5
capstone.routing.tmap.candidate-timeout-seconds=7

capstone.routing.segment-optimizer.enabled=true
capstone.routing.segment-optimizer.only-when-missing-route=true

capstone.weather.kma.enabled=true
capstone.weather.kma.request-timeout-seconds=4

capstone.local-db.enabled=true
capstone.local-db.osm-import-enabled=false
capstone.local-db.building-warmup.enabled=true
